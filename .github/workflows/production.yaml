name: Deploy (main)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ vars.FTP_SERVER_PRODUCTION }}
        username: ${{ vars.FTP_USERNAME_PRODUCTION }}
        password: ${{ secrets.FTP_PASSWORD_PRODUCTION }}
        protocol: ftps
        port: 21
        server-dir: /public/

